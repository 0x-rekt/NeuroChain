<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>NeuroChain Extension</title>
  <style>
    body {
      width: 320px;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #0f172a; /* Tailwind slate-900 */
      color: #f8fafc; /* Tailwind slate-50 */
      margin: 0;
    }
    .header {
      font-size: 1.25rem;
      font-weight: 700;
      margin-bottom: 5px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .status-box {
      background-color: #1e293b;
      padding: 12px;
      border-radius: 8px;
      margin-top: 15px;
      border: 1px solid #334155;
    }
    .wallet-text {
      font-family: monospace;
      color: #38bdf8; /* Tailwind sky-400 */
      word-break: break-all;
      margin-top: 5px;
      font-size: 0.85rem;
    }
    .btn {
      display: block;
      width: 100%;
      padding: 10px;
      background-color: #3b82f6;
      color: white;
      text-align: center;
      border-radius: 6px;
      text-decoration: none;
      font-weight: 600;
      margin-top: 15px;
      cursor: pointer;
      border: none;
      transition: background 0.2s;
    }
    .btn:hover { background-color: #2563eb; }
    .indicator {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background-color: #ef4444; /* red */
    }
    .indicator.active { background-color: #22c55e; /* green */ }
  </style>
</head>
<body>
  <div class="header">
    <div id="status-dot" class="indicator"></div>
    NeuroChain Extractor
  </div>
  <p style="font-size: 0.85rem; color: #94a3b8; margin-top: 0;">Continuous Intelligence Engine</p>

  <div class="status-box">
    <div style="font-weight: 600; font-size: 0.9rem;">Wallet Status:</div>
    <div id="wallet-address" class="wallet-text">Not Connected</div>
  </div>

  <button id="login-btn" class="btn">Login via Web App</button>

  <script src="popup.js"></script>
</body>
</html>
